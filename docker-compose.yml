version: '3.9'
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://crm:password@db:5432/crmdb
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: password