{% load static i18n %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - HITLUR CRM</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0d0f1a]">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-10">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-[#7c6ef5] to-[#10d4a0] rounded-2xl flex items-center justify-center text-4xl font-bold text-white">H</div>
            </div>
            <h1 class="text-4xl font-bold tracking-tight">HIT<span class="text-[#10d4a0]">LUR</span></h1>
            <p class="text-[#9196b3] mt-2">Professional CRM Platform</p>
        </div>

        <div class="bg-[#1a1d2e] border border-[#252840] rounded-3xl p-10 shadow-2xl">
            <form method="post">
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="bg-red-500/10 border border-red-500 text-red-400 p-4 rounded-2xl mb-6">
                    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                </div>
                {% endif %}

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm text-[#9196b3] mb-2">Username or Email</label>
                        {{ form.username }}
                    </div>
                    <div>
                        <label class="block text-sm text-[#9196b3] mb-2">Password</label>
                        {{ form.password }}
                    </div>

                    <button type="submit" 
                            class="w-full bg-[#7c6ef5] hover:bg-[#6a5ce8] text-white py-4 rounded-2xl font-semibold text-lg transition-all">
                        Sign In
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-[#5c6080] text-sm mt-8">
            © HITLUR CRM 2026
        </p>
    </div>
</body>
</html>
